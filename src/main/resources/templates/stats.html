<!DOCTYPE html>
<html lang="zh-Hant" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>統計資訊 - MiniClinic</title>
    <style>
        body { font-family: "Microsoft JhengHei", sans-serif; max-width: 800px; margin: 40px auto; padding: 0 20px; }
        h1 { color: #0F2443; border-bottom: 3px solid #14B8A6; padding-bottom: 8px; }
        h2 { color: #0F2443; margin-top: 32px; font-size: 18px; }
        nav { background: #0F2443; padding: 12px; border-radius: 8px; margin-bottom: 24px; }
        nav a { color: white; margin-right: 20px; text-decoration: none; font-weight: bold; }
        nav a:hover { color: #5EEAD4; }
        .stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin: 24px 0; }
        .stat-card { background: #F8FAFC; border: 2px solid #E2E8F0; border-radius: 8px; padding: 24px; text-align: center; }
        .stat-card .label { color: #64748B; font-size: 14px; margin-bottom: 8px; }
        .stat-card .value { color: #0F2443; font-size: 40px; font-weight: bold; line-height: 1; }
        table { width: 100%; border-collapse: collapse; margin-top: 12px; }
        th { background: #0F2443; color: white; padding: 10px; text-align: left; }
        td { padding: 10px; border-bottom: 1px solid #E2E8F0; }
        tr:hover td { background: #F0FDFA; }
        .empty { text-align: center; color: #94A3B8; padding: 40px; }
    </style>
</head>
<body>
    <nav>
        <a th:href="@{/}">首頁</a>
        <a th:href="@{/doctors}">醫師清單</a>
        <a th:href="@{/appointment/new}">線上掛號</a>
        <a th:href="@{/appointments}">掛號記錄</a>
        <a th:href="@{/stats}">統計資訊</a>
        <a th:href="@{/login}">醫師登入</a>
    </nav>

    <h1>統計資訊</h1>

    <div class="stats-grid">
        <div class="stat-card">
            <div class="label">醫師總數</div>
            <div class="value" th:text="${doctorCount}">5</div>
        </div>
        <div class="stat-card">
            <div class="label">病患總數</div>
            <div class="value" th:text="${patientCount}">3</div>
        </div>
        <div class="stat-card">
            <div class="label">掛號總數</div>
            <div class="value" th:text="${appointmentCount}">3</div>
        </div>
    </div>

    <h2>各科別掛號數</h2>

    <table th:if="${not #maps.isEmpty(countByDepartment)}">
        <thead>
            <tr>
                <th>科別</th>
                <th>掛號數</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="entry : ${countByDepartment}">
                <td th:text="${entry.key}">家醫科</td>
                <td th:text="${entry.value}">1</td>
            </tr>
        </tbody>
    </table>

    <p class="empty" th:if="${#maps.isEmpty(countByDepartment)}">目前尚無掛號資料</p>

    <p style="margin-top: 24px;">
        <a th:href="@{/appointments}">查看掛號記錄</a> | <a th:href="@{/}">← 回首頁</a>
    </p>
</body>
</html>
